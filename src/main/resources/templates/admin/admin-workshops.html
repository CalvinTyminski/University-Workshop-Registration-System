<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Workshops</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }


        .container {
            width: 80%;
            margin: 20px auto;
        }

        h2 {
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-top: 0;
        }

        .card a {
            display: inline-block;
            margin-top: 10px;
            color: #007bff;
        }
    </style>
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<h2>Admin Dashboard</h2>

<a href="/admin/workshops/new">Create Workshop</a>

<div th:each="w : ${workshops}">
    <h3 th:text="${w.title}"></h3>
    <p th:text="${w.workshopStatus}"></p>

    <a th:href="@{/admin/workshops/{id}/edit(id=${w.id})}">Edit</a>

    <form th:action="@{/admin/workshops/{id}/cancel(id=${w.id})}" method="post">
        <button type="submit">Cancel</button>
    </form>
</div>

</body>
</html>
