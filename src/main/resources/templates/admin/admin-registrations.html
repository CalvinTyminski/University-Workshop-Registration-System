<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Registrations</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .container {
            width: 80%;
            margin: 20px auto;
        }

        h2 {
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-top: 0;
        }

        .info {
            margin: 6px 0;
        }

        .label {
            font-weight: bold;
        }

        .status {
            font-weight: bold;
        }

        .status.ACTIVE {
            color: green;
        }

        .status.CANCELLED {
            color: red;
        }
    </style>
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div class="container">

    <h2>Registrations</h2>

    <div th:if="${#lists.isEmpty(registrations)}">
        <p>No registrations found.</p>
    </div>

    <div th:each="r : ${registrations}" class="card">

        <h3 th:text="${r.user.email}"></h3>

        <p class="info">
            <span class="label">Created:</span>
            <span th:text="${r.created_at}"></span>
        </p>

        <p class="info">
            <span class="label">Status:</span>
            <span class="status"
                  th:classappend="${r.registrationStatus}"
                  th:text="${r.registrationStatus}">
            </span>
        </p>

    </div>

</div>

</body>
</html>
