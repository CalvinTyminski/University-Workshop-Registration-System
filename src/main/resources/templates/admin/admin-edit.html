<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Create Workshop</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .container {
            width: 80%;
            margin: 20px auto;
        }

        h2 {
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background: #0056b3;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #565e64;
        }
    </style>
</head>

<body>
<div th:if="${success}" style="color:green;">
    <p th:text="${success}"></p>
</div>

<div th:if="${error}" style="color:red;">
    <p th:text="${error}"></p>
</div>

<div th:replace="fragments/header :: header"></div>

<div class="container">

    <h2>Create Workshop</h2>

    <div class="card">

        <form th:action="@{/admin/workshops/{id}(id=${workshop.id})}" th:object="${workshop}" method="post">

            <input th:field="*{title}" placeholder="Title" />
            <input th:field="*{description}" placeholder="Description" />
            <input th:field="*{location}" placeholder="Location" />

            <input type="datetime-local" th:field="*{start_datetime}" />

            <input type="number" th:field="*{total_seats}" placeholder="Total Seats" />

            <div class="buttons">

                <button class="btn btn-primary" type="submit">Update</button>

                <a class="btn btn-secondary"
                   th:href="@{/admin/workshops}">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
