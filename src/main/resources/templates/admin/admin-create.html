<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }


        .container {
            width: 80%;
            margin: 20px auto;
        }

        h2 {
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-top: 0;
        }

        .card a {
            display: inline-block;
            margin-top: 10px;
            color: #007bff;
        }
    </style>
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<form th:action="@{/admin/workshops}" th:object="${workshop}" method="post">

    <input th:field="*{title}" placeholder="Title"/>
    <input th:field="*{description}" placeholder="Description"/>
    <input th:field="*{location}" placeholder="Location"/>

    <input type="datetime-local" th:field="*{start_datetime}"/>

    <input type="number" th:field="*{total_seats}"/>

    <button>Create</button>
</form>
</body>
</html>
