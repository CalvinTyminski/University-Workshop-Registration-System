<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>University-WRS</title>
</head>
<body>
<div th:fragment="header">
    <style>
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 25px;
            background: #1f1f1f;
            color: white;
        }

        .logo span {
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 6px 10px;
            display: flex;
            align-items: center;
        }

        .nav-links a:hover {
            background: #444;
            border-radius: 6px;
        }
    </style>

    <header class="header">

        <div class="logo">
            <span>U-WRS</span>
        </div>

        <nav class="nav-links">
            <a th:href="@{/}">Home</a>

            <span sec:authorize="isAnonymous()">
                <a th:href="@{/login}">Login</a>
                <a th:href="@{/register}">Register</a>
            </span>

            <span sec:authorize="isAuthenticated()">
                <a th:href="@{/my/registrations}">My Registrations</a>

                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/workshops}">Admin</a>

                <a th:href="@{/logout}">Logout</a>
            </span>
        </nav>

    </header>
</div>

</body>
</html>
