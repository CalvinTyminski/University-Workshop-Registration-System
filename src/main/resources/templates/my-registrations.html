<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Registrations</title>
</head>
<body>

<h2>My Registrations</h2>
<div th:each="r : ${registrations}">
    <p th:text="${r.workshop.title}"></p>
    <p th:text="${r.registrationStatus}"></p>

    <form th:action="@{'/registrations/' + ${r.id}}" method="post">
        <button type="submit">Cancel</button>
    </form>
</div>

</body>
</html>
