<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>My Registrations</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .container {
            width: 80%;
            margin: 20px auto;
        }

        h2 {
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-top: 0;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #b52a37;
        }

        .status {
            font-weight: bold;
        }
    </style>
</head>

<body>
<div th:if="${success}" style="color:green;">
    <p th:text="${success}"></p>
</div>

<div th:if="${error}" style="color:red;">
    <p th:text="${error}"></p>
</div>

<div th:replace="fragments/header :: header"></div>

<div class="container">

    <h2>My Registrations</h2>

    <div th:if="${#lists.isEmpty(registrations)}">
        <p>You have no registrations yet.</p>
    </div>

    <div th:each="r : ${registrations}" th:if="${r.workshop != null and r.workshop.start_datetime != null and r.workshop.start_datetime.isAfter(T(java.time.LocalDateTime).now())}" class="card">

        <h3 th:text="${r.workshop.title}"></h3>

        <p>
            <strong>Date:</strong>
            <span th:text="${r.workshop.start_datetime}"></span>
        </p>

        <p>
            <strong>Status:</strong>
            <span class="status" th:text="${r.registrationStatus}"></span>
        </p>

        <form th:if="${r.registrationStatus.name() != 'CANCELLED'}" th:action="@{/registrations/{id}/cancel(id=${r.id})}" method="post">
            <button class="btn" type="submit">Cancel Registration</button>
        </form>

    </div>

</div>

</body>
</html>
